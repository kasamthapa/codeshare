<!doctype html>
<html>
  <head>
    <title>Generate Icons</title>
  </head>
  <body>
    <script>
      function drawIcon(size) {
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        const r = size * 0.224; // corner radius

        // Rounded rect clip
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.clip();

        // Background gradient
        const bg = ctx.createLinearGradient(0, 0, size, size);
        bg.addColorStop(0, "#1a1f2e");
        bg.addColorStop(1, "#0d1117");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, size, size);

        // Grid lines
        ctx.strokeStyle = "rgba(47,129,247,0.08)";
        ctx.lineWidth = size * 0.003;
        const step = size / 4;
        for (let i = 1; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(i * step, 0);
          ctx.lineTo(i * step, size);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, i * step);
          ctx.lineTo(size, i * step);
          ctx.stroke();
        }

        // Glow circle
        const glow = ctx.createRadialGradient(
          size / 2,
          size * 0.48,
          0,
          size / 2,
          size * 0.48,
          size * 0.35,
        );
        glow.addColorStop(0, "rgba(47,129,247,0.22)");
        glow.addColorStop(1, "rgba(158,107,255,0.0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, size, size);

        // Lightning bolt
        const s = size;
        ctx.shadowColor = "#2f81f7";
        ctx.shadowBlur = s * 0.06;
        const bolt = ctx.createLinearGradient(
          s * 0.35,
          s * 0.15,
          s * 0.65,
          s * 0.85,
        );
        bolt.addColorStop(0, "#58a6ff");
        bolt.addColorStop(1, "#9e6bff");
        ctx.fillStyle = bolt;
        ctx.beginPath();
        ctx.moveTo(s * 0.576, s * 0.156);
        ctx.lineTo(s * 0.352, s * 0.537);
        ctx.lineTo(s * 0.478, s * 0.537);
        ctx.lineTo(s * 0.424, s * 0.844);
        ctx.lineTo(s * 0.648, s * 0.463);
        ctx.lineTo(s * 0.522, s * 0.463);
        ctx.closePath();
        ctx.fill();

        // Border ring
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(47,129,247,0.25)";
        ctx.lineWidth = size * 0.012;
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.stroke();

        return canvas;
      }

      function download(canvas, filename) {
        const a = document.createElement("a");
        a.download = filename;
        a.href = canvas.toDataURL("image/png");
        a.click();
      }

      // Generate both sizes
      download(drawIcon(192), "icon-192.png");
      setTimeout(() => download(drawIcon(512), "icon-512.png"), 500);

      document.body.innerHTML =
        '<p style="font-family:sans-serif;padding:2rem">✅ Done! Two files downloaded: <strong>icon-192.png</strong> and <strong>icon-512.png</strong><br><br>Move both files into your <code>public/</code> folder, then come back to Claude.</p>';
    </script>
  </body>
</html>
