<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeShare — Real-time Collaborative Editor</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="theme-color" content="#161b22" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="CodeShare" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d1117;
        --bg2: #161b22;
        --bg3: #21262d;
        --border: #30363d;
        --border2: #3d444d;
        --text: #e6edf3;
        --text2: #8d96a0;
        --text3: #484f58;
        --accent: #2f81f7;
        --accent2: #388bfd;
        --accent-bg: rgba(47, 129, 247, 0.12);
        --green: #3fb950;
        --red: #f85149;
        --red-bg: rgba(248, 81, 73, 0.1);
        --yellow: #d29922;
        --glow: 0 0 40px rgba(47, 129, 247, 0.08);
      }

      html,
      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
      }

      /* ── Animated background grid ─────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(47, 129, 247, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(47, 129, 247, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      /* ── Glow orbs ────────────────────────────────────────────── */
      body::after {
        content: "";
        position: fixed;
        top: -30%;
        left: -10%;
        width: 60%;
        height: 60%;
        background: radial-gradient(
          ellipse,
          rgba(47, 129, 247, 0.06) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      /* ── Layout ──────────────────────────────────────────────── */
      .page {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 3rem 1.5rem 2rem;
      }

      /* ── Brand ───────────────────────────────────────────────── */
      .brand {
        text-align: center;
        margin-bottom: 3rem;
      }

      .brand-logo {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 1rem;
      }

      .logo-icon {
        width: 44px;
        height: 44px;
        background: linear-gradient(135deg, var(--accent) 0%, #9e6bff 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        box-shadow: 0 4px 20px rgba(47, 129, 247, 0.3);
      }

      .brand h1 {
        font-size: 1.9rem;
        font-weight: 700;
        background: linear-gradient(
          135deg,
          var(--text) 30%,
          var(--accent2) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
      }

      .brand-tagline {
        font-size: 0.9rem;
        color: var(--text2);
        margin-top: 0.5rem;
      }

      .brand-badges {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 1rem;
        flex-wrap: wrap;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.25rem 0.65rem;
        border-radius: 20px;
        font-size: 0.72rem;
        font-weight: 500;
        border: 1px solid var(--border);
        background: var(--bg2);
        color: var(--text2);
      }
      .badge.green {
        color: var(--green);
        border-color: rgba(63, 185, 80, 0.3);
        background: rgba(63, 185, 80, 0.06);
      }
      .badge.blue {
        color: var(--accent2);
        border-color: rgba(56, 139, 253, 0.3);
        background: var(--accent-bg);
      }

      /* ── Card ────────────────────────────────────────────────── */
      .card {
        width: 100%;
        max-width: 460px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        box-shadow:
          0 8px 40px rgba(0, 0, 0, 0.4),
          var(--glow);
      }

      /* ── Tabs ────────────────────────────────────────────────── */
      .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }

      .tab-btn {
        flex: 1;
        padding: 0.9rem;
        background: transparent;
        border: none;
        color: var(--text2);
        font-size: 0.875rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition:
          color 0.15s,
          background 0.15s;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .tab-btn.active {
        color: var(--text);
        border-bottom-color: var(--accent);
        background: var(--bg2);
      }
      .tab-btn:not(.active):hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
      }

      /* ── Form body ───────────────────────────────────────────── */
      .tab-panel {
        display: none;
        padding: 1.75rem;
      }
      .tab-panel.active {
        display: block;
      }

      .form-group {
        margin-bottom: 1.1rem;
      }

      label {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text2);
        margin-bottom: 0.45rem;
        letter-spacing: 0.3px;
      }

      label .optional {
        font-weight: 400;
        color: var(--text3);
        font-size: 0.75rem;
      }

      .input-wrap {
        position: relative;
      }

      .input-icon {
        position: absolute;
        left: 0.8rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.9rem;
        pointer-events: none;
        opacity: 0.5;
      }

      input {
        width: 100%;
        padding: 0.65rem 0.85rem 0.65rem 2.3rem;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 0.875rem;
        font-family: inherit;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(47, 129, 247, 0.15);
      }
      input::placeholder {
        color: var(--text3);
      }

      .hint {
        margin-top: 0.35rem;
        font-size: 0.73rem;
        color: var(--text3);
      }

      /* ── Divider ─────────────────────────────────────────────── */
      .divider {
        height: 1px;
        background: var(--border);
        margin: 1.25rem 0;
      }

      /* ── Primary button ──────────────────────────────────────── */
      .btn-primary {
        width: 100%;
        padding: 0.75rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition:
          background 0.15s,
          box-shadow 0.15s,
          transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--accent2);
        box-shadow: 0 4px 16px rgba(47, 129, 247, 0.35);
        transform: translateY(-1px);
      }
      .btn-primary:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: none;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── Error banner ────────────────────────────────────────── */
      .error-msg {
        display: none;
        align-items: center;
        gap: 0.5rem;
        background: var(--red-bg);
        border: 1px solid rgba(248, 81, 73, 0.3);
        color: var(--red);
        padding: 0.6rem 0.85rem;
        border-radius: 8px;
        font-size: 0.83rem;
        margin-bottom: 1.1rem;
      }
      .error-msg.show {
        display: flex;
      }

      /* ── Recent rooms ────────────────────────────────────────── */
      .recent-rooms {
        width: 100%;
        max-width: 460px;
        margin-bottom: 1.25rem;
      }
      .recent-label {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.6rem;
      }
      .recent-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }
      .recent-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 0.3rem 0.8rem;
        font-size: 0.78rem;
        color: var(--text2);
        cursor: pointer;
        text-decoration: none;
        font-family: inherit;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
      }
      .recent-chip:hover {
        border-color: var(--accent);
        color: var(--text);
        background: var(--accent-bg);
      }
      .recent-chip-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.6;
      }

      /* ── Footer ──────────────────────────────────────────────── */
      .footer {
        margin-top: auto;
        padding-top: 2.5rem;
        text-align: center;
        font-size: 0.78rem;
        color: var(--text3);
      }
      .footer a {
        color: var(--text2);
        text-decoration: none;
      }
      .footer a:hover {
        color: var(--text);
      }
      .heart {
        color: #f85149;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">
          <div class="logo-icon">⚡</div>
          <h1>CodeShare</h1>
        </div>
        <p class="brand-tagline">
          Real-time collaborative code editor &mdash; built for classrooms
        </p>
        <div class="brand-badges">
          <span class="badge green">● No login required</span>
          <span class="badge blue">⚡ Real-time sync</span>
          <span class="badge">🔒 Password protected</span>
        </div>
      </div>

      <!-- Recent rooms -->
      <div class="recent-rooms" id="recent-rooms-wrap" style="display: none">
        <div class="recent-label">Recent rooms</div>
        <div class="recent-list" id="recent-list"></div>
      </div>

      <!-- Main card -->
      <div class="card">
        <div class="tabs">
          <button
            class="tab-btn active"
            id="tab-create"
            onclick="switchTab('create')"
          >
            Create Room
          </button>
          <button class="tab-btn" id="tab-join" onclick="switchTab('join')">
            Join Room
          </button>
        </div>

        <!-- Create panel -->
        <div id="panel-create" class="tab-panel active">
          <div id="create-error" class="error-msg">⚠ <span></span></div>

          <div class="form-group">
            <label for="create-name">Room Name</label>
            <div class="input-wrap">
              <span class="input-icon">#</span>
              <input
                id="create-name"
                type="text"
                placeholder="e.g. python-101"
                autocomplete="off"
              />
            </div>
            <div class="hint">
              Letters, numbers and hyphens. Spaces become hyphens.
            </div>
          </div>

          <div class="form-group">
            <label for="create-pass">Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input
                id="create-pass"
                type="password"
                placeholder="Choose a password"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="create-user"
              >Your Name <span class="optional">(optional)</span></label
            >
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input
                id="create-user"
                type="text"
                placeholder="e.g. Alice"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="divider"></div>
          <button class="btn-primary" id="create-btn" onclick="createRoom()">
            <span id="create-btn-text">Create Room</span>
            <span id="create-btn-arrow">→</span>
          </button>
        </div>

        <!-- Join panel -->
        <div id="panel-join" class="tab-panel">
          <div id="join-error" class="error-msg">⚠ <span></span></div>

          <div class="form-group">
            <label for="join-name">Room Name</label>
            <div class="input-wrap">
              <span class="input-icon">#</span>
              <input
                id="join-name"
                type="text"
                placeholder="e.g. python-101"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="join-pass">Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input
                id="join-pass"
                type="password"
                placeholder="Enter room password"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="join-user"
              >Your Name <span class="optional">(optional)</span></label
            >
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input
                id="join-user"
                type="text"
                placeholder="e.g. Bob"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="divider"></div>
          <button class="btn-primary" id="join-btn" onclick="joinRoom()">
            <span id="join-btn-text">Join Room</span>
            <span id="join-btn-arrow">→</span>
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <a
          href="https://github.com/kasamthapa?tab=overview&from=2026-04-01&to=2026-04-22"
          target="_blank"
          ><i class="fa fa-github" style="font-size: 36px"></i>Kasam Thapa
          Magar</a
        >
      </div>
    </div>
    <!-- .page -->

    <script>
      // ── Recent rooms ──────────────────────────────────────────────────────────
      (function renderRecent() {
        try {
          const rooms = JSON.parse(localStorage.getItem("cs_recent") || "[]");
          if (!rooms.length) return;
          const wrap = document.getElementById("recent-rooms-wrap");
          const list = document.getElementById("recent-list");
          wrap.style.display = "";
          rooms.forEach(({ name }) => {
            const chip = document.createElement("button");
            chip.className = "recent-chip";
            chip.innerHTML = `<span class="recent-chip-dot"></span><span>#${name}</span>`;
            chip.onclick = () => {
              switchTab("join");
              document.getElementById("join-name").value = name;
              document.getElementById("join-pass").focus();
            };
            list.appendChild(chip);
          });
        } catch (_) {}
      })();

      (function prefill() {
        const pathMatch = window.location.pathname.match(/^\/room\/(.+)$/);
        const params = new URLSearchParams(window.location.search);
        const joinParam = params.get("join");
        const roomHint = pathMatch
          ? decodeURIComponent(pathMatch[1])
          : joinParam;
        if (roomHint) {
          switchTab("join");
          document.getElementById("join-name").value = roomHint;
          document.getElementById("join-pass").focus();
        }
      })();

      function switchTab(tab) {
        const isCreate = tab === "create";
        document
          .getElementById("tab-create")
          .classList.toggle("active", isCreate);
        document
          .getElementById("tab-join")
          .classList.toggle("active", !isCreate);
        document
          .getElementById("panel-create")
          .classList.toggle("active", isCreate);
        document
          .getElementById("panel-join")
          .classList.toggle("active", !isCreate);
      }

      function showError(panelId, msg) {
        const el = document.getElementById(panelId + "-error");
        el.querySelector("span").textContent = msg;
        el.classList.add("show");
      }
      function clearError(panelId) {
        document.getElementById(panelId + "-error").classList.remove("show");
      }

      async function createRoom() {
        clearError("create");
        const roomName = document.getElementById("create-name").value.trim();
        const password = document.getElementById("create-pass").value;
        const username =
          document.getElementById("create-user").value.trim() || "Host";

        if (!roomName) return showError("create", "Please enter a room name.");
        if (!password) return showError("create", "Please choose a password.");

        const btn = document.getElementById("create-btn");
        btn.disabled = true;
        document.getElementById("create-btn-text").textContent = "Creating…";
        document.getElementById("create-btn-arrow").textContent = "";

        try {
          const res = await fetch("/api/create-room", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ roomName, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            showError("create", data.error);
            btn.disabled = false;
            document.getElementById("create-btn-text").textContent =
              "Create Room";
            document.getElementById("create-btn-arrow").textContent = "→";
            return;
          }
          sessionStorage.setItem("roomPassword", password);
          sessionStorage.setItem("username", username);
          window.location.href = `/room/${data.roomName}`;
        } catch {
          showError("create", "Could not reach the server. Is it running?");
          btn.disabled = false;
          document.getElementById("create-btn-text").textContent =
            "Create Room";
          document.getElementById("create-btn-arrow").textContent = "→";
        }
      }

      async function joinRoom() {
        clearError("join");
        const roomName = document.getElementById("join-name").value.trim();
        const password = document.getElementById("join-pass").value;
        const username = document.getElementById("join-user").value.trim();

        if (!roomName) return showError("join", "Please enter a room name.");
        if (!password) return showError("join", "Please enter the password.");

        const btn = document.getElementById("join-btn");
        btn.disabled = true;
        document.getElementById("join-btn-text").textContent = "Joining…";
        document.getElementById("join-btn-arrow").textContent = "";

        try {
          const res = await fetch("/api/join-room", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ roomName, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            showError("join", data.error);
            btn.disabled = false;
            document.getElementById("join-btn-text").textContent = "Join Room";
            document.getElementById("join-btn-arrow").textContent = "→";
            return;
          }
          sessionStorage.setItem("roomPassword", password);
          sessionStorage.setItem("username", username);
          window.location.href = `/room/${data.roomName}`;
        } catch {
          showError("join", "Could not reach the server. Is it running?");
          btn.disabled = false;
          document.getElementById("join-btn-text").textContent = "Join Room";
          document.getElementById("join-btn-arrow").textContent = "→";
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        const createActive = document
          .getElementById("panel-create")
          .classList.contains("active");
        if (createActive) createRoom();
        else joinRoom();
      });
    </script>
  </body>
</html>
